<style>
  :root{
    --bg:#FFFFFF; --ink:#17201E; --teal:#0E5F54;
    --muted:#8B8F8A; --line:#ECEBE7;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Manrope','Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);
       min-height:100vh;display:flex;flex-direction:column;align-items:center;
       padding:76px 24px 52px}
  .hero{text-align:center;width:100%;max-width:520px}
  .logo-img{width:400px;max-width:84vw;height:auto}
  .kicker{margin-top:22px;font-size:11px;font-weight:600;letter-spacing:3.5px;
          text-transform:uppercase;color:var(--muted)}
  .list{margin-top:52px;width:100%;max-width:480px;border-top:1px solid var(--line)}
  a.row{display:flex;align-items:center;gap:18px;padding:22px 8px;
         border-bottom:1px solid var(--line);text-decoration:none;color:inherit;
         transition:padding .25s ease,background .25s ease}
  a.row:hover{padding-left:16px;padding-right:2px;background:rgba(14,95,84,.04)}
  a.row:focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:6px}
  .rnum{font-size:12px;font-weight:600;color:var(--teal);width:16px;flex-shrink:0;letter-spacing:.5px}
  .rmain{flex:1;min-width:0}
  .rt{font-size:16px;font-weight:600;letter-spacing:-.2px}
  .rd{font-size:12.5px;color:var(--muted);margin-top:3px;font-family:'Noto Sans KR',sans-serif}
  .arr{width:20px;height:20px;flex-shrink:0;color:var(--muted);transition:transform .25s ease,color .25s ease}
  a.row:hover .arr{transform:translateX(4px);color:var(--teal)}
  .arr svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  footer{margin-top:44px;text-align:center;color:var(--muted);font-size:12px;letter-spacing:.3px;line-height:1.9}
  footer b{color:var(--ink);font-weight:600}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
  @media(max-width:520px){.logo-img{width:300px}.list{margin-top:40px}}
</style>
</head>

      <span class="arr"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="18" y2="12"/><polyline points="12 6 18 12 12 18"/></svg></span>
    </a>
